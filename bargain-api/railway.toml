[build]
builder = "NIXPACKS"
buildCommand = "pip install -r requirements.txt"

[build.env]
PYTHON_VERSION = "3.11"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
port = 4030

[start]
command = "uvicorn app.main:app --host 0.0.0.0 --port 4030"
