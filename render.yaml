services:
  - type: web
    name: bargain-web
    env: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@9.15.5 --activate && pnpm install --frozen-lockfile=false && pnpm run build
    startCommand: sh -c "cd bargain-web && pnpm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://api.bargainhuntrs.com
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        value: pk_live_51R1DRCGjfcTjkbiAVgEeGkRC5Kix5TuNqR6G3UJn4qo2vNzkGwVfBXjTE98D7RWDFBvpGAVJfNj76scfTIxDbBfR00miZOCTx3
      - key: NODE_VERSION
        value: 24
