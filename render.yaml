services:
  - type: web
    name: bargain-web
    env: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@9.15.5 --activate && pnpm install --frozen-lockfile=false && pnpm run build
    startCommand: sh -c "cd bargain-web && pnpm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://bargainhuntrs.com
      - key: NODE_VERSION
        value: 24
