services:
  - type: web
    name: bargain-web
    env: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@9.15.5 --activate && pnpm install && pnpm run build
    startCommand: cd bargain-web && pnpm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://bargainhuntrs.com
      - key: NODE_VERSION
        value: 24
